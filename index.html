<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatVault · Organiza tus chats con IA</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuente Inter desde fontsource -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.8/index.min.css" />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- ============================================================
       Módulos de ChatVault (cargar en orden de dependencias)
       ============================================================ -->

  <!-- 1. Constantes y configuración -->
  <script src="js/constants.js"></script>

  <!-- 2. Utilidades -->
  <script src="js/utils.js"></script>

  <!-- 3. Store (persistencia) -->
  <script src="js/store.js"></script>

  <!-- 4. Estado global -->
  <script src="js/state.js"></script>

  <!-- 5. Smart Capture Engine -->
  <script src="js/smart-capture.js"></script>

  <!-- 6. Filtros -->
  <script src="js/filters.js"></script>

  <!-- 7. Acciones -->
  <script src="js/actions.js"></script>

  <!-- 8. Render: Login -->
  <script src="js/render/login.js"></script>

  <!-- 9. Render: Dashboard -->
  <script src="js/render/dashboard.js"></script>

  <!-- 10. Render: Vault -->
  <script src="js/render/vault.js"></script>

  <!-- 11. Render: Prompts -->
  <script src="js/render/prompts.js"></script>

  <!-- 12. Render: Arena -->
  <script src="js/render/arena.js"></script>

  <!-- 13. Render: Modales -->
  <script src="js/render/modals.js"></script>

  <!-- 14. Entry point (render principal + init) -->
  <script src="js/app.js"></script>
</body>
</html>
